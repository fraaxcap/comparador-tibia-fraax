<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fravao Cap - Comparativo Cross-World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Martel:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea;
            --bg-dark: #0a0a0c;
            --spectral-bolt: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% -20%, #2e1a4d 0%, #0a0a0c 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(17, 17, 23, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(168, 85, 247, 0.15);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7);
        }

        .silver-text {
            font-family: 'Martel', serif;
            background: linear-gradient(to right, #94a3b8, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
            white-space: nowrap; 
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding-bottom: 5px;
            font-style: normal; 
        }

        .subtitle-text {
            font-family: 'Martel', serif;
            font-weight: 400;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Container da Flecha Ajustado */
        .arrow-container {
            position: absolute;
            width: 42px; 
            height: 16px;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            top: 68px; 
            /* Mudado para linear para manter velocidade constante (flecha não freia) */
            animation: bolt-loop 4s infinite linear; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG da Flecha Roxa */
        .spectral-arrow {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 6px var(--spectral-bolt));
        }

        @keyframes bolt-loop {
            /* IDA: Esquerda para Direita */
            0% { 
                left: -11%; /* Ajustado para encostar no Mage esquerdo */
                opacity: 0; 
                transform: scaleX(1); 
            }
            2% { 
                opacity: 1; 
            }
            48% { 
                left: 111%; /* Ajustado para encostar no Mage direito */
                opacity: 1;
                transform: scaleX(1);
            }
            49% { 
                opacity: 0;
                transform: scaleX(1);
            }

            /* VOLTA: Direita para Esquerda */
            50% { 
                left: 111%; 
                opacity: 0; 
                transform: scaleX(-1); 
            }
            52% { 
                opacity: 1; 
            }
            98% { 
                left: -22%; 
                opacity: 1;
                transform: scaleX(-1);
            }
            100% { 
                opacity: 0; 
                left: -11%;
                transform: scaleX(-1);
            }
        }

        .input-dark {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.1);
            color: white;
            transition: all 0.3s;
        }

        .input-dark:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.15);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #9333ea 0%, #6b21a8 100%);
        }

        .medal-1 { color: #fbbf24; }
        .medal-2 { color: #94a3b8; }
        .medal-3 { color: #b45309; }
        
        .mirror { transform: scaleX(-1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9333ea; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-16 text-center relative overflow-visible">
        <div class="flex items-center justify-center gap-2 md:gap-14 mb-2 px-2 overflow-visible relative">
            
            <!-- Mage da Esquerda -->
            <div class="relative shrink-0 z-20">
                <img src="https://raw.githubusercontent.com/fraaxcap/comparador-tibia-fraax/5e186fbf7e5fab55fedc614a8dbb7b49ff312cfe/Mage.gif" 
                     alt="Mage Esquerda" class="w-16 h-16 md:w-28 md:h-28 mirror opacity-90 drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
            </div>

            <!-- Área Central -->
            <div class="flex flex-col items-center justify-center overflow-visible pt-2 relative flex-1">
                
                <h1 class="text-3xl sm:text-5xl md:text-7xl font-black tracking-tighter silver-text px-2 z-10 relative">
                    FRAVAO CAP
                </h1>

                <!-- Projétil Spectral Arrow (Sincronizado e Linear) -->
                <div class="absolute inset-0 pointer-events-none overflow-visible hidden sm:block">
                    <div class="arrow-container">
                        <svg class="spectral-arrow" viewBox="0 0 100 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Corpo Robusto -->
                            <path d="M15 10H85" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                            <!-- Penas Traseiras -->
                            <path d="M5 3L20 10L5 17" stroke="#a855f7" stroke-width="2.5" stroke-linejoin="round"/>
                            <!-- Ponta Perfurante Branca com borda Roxa -->
                            <path d="M78 3L97 10L78 17Z" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>
                            <!-- Brilho Interno (Core) -->
                            <path d="M25 10H70" stroke="white" stroke-width="1" opacity="0.9" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>

                <p class="subtitle-text text-slate-400 tracking-[0.3em] uppercase text-[10px] md:text-xs opacity-80 mt-6 z-10 relative">
                    Comparativo de Itens Cross-World
                </p>
            </div>

            <!-- Mage da Direita -->
            <div class="relative shrink-0 z-20">
                <img src="https://raw.githubusercontent.com/fraaxcap/comparador-tibia-fraax/5e186fbf7e5fab55fedc614a8dbb7b49ff312cfe/Mage.gif" 
                     alt="Mage Direita" class="w-16 h-16 md:w-28 md:h-28 opacity-90 drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto space-y-8">
        <!-- Inputs Globais -->
        <section class="glass-card rounded-3xl p-6 md:p-8 border-t border-purple-500/30">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-6 items-end">
                <div class="lg:col-span-4">
                    <label class="block text-[10px] font-black text-purple-400 uppercase mb-2.5 tracking-widest">Item</label>
                    <input type="text" id="globalItemName" placeholder="Ex: Soulbleeder..." 
                           class="w-full p-4 rounded-2xl input-dark text-lg font-bold">
                </div>
                <div class="lg:col-span-3">
                    <label class="block text-[10px] font-black text-purple-400 uppercase mb-2.5 tracking-widest">25 Coins (R$)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">R$</span>
                        <input type="text" id="globalCoin25" placeholder="5,50" 
                               class="w-full p-4 pl-12 rounded-2xl input-dark text-lg font-bold">
                    </div>
                </div>
                <div class="lg:col-span-5 flex flex-wrap gap-3">
                    <button onclick="addWorld()" class="btn-gradient flex-1 min-w-[120px] px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider text-white hover:brightness-110 transition-all">
                        + Servidor
                    </button>
                    <button onclick="calculate()" class="bg-white hover:bg-slate-100 text-slate-950 flex-1 min-w-[120px] px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider transition-all transform active:scale-95">
                        Calcular
                    </button>
                    <button onclick="resetSearch()" class="bg-slate-800/50 hover:bg-slate-800 text-slate-400 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider transition-all border border-white/5">
                        Reset
                    </button>
                </div>
            </div>
        </section>

        <!-- Container de Mundos -->
        <div id="worldsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Relatório -->
        <div id="resultsWrapper" class="hidden space-y-6 pt-10">
            <div class="flex items-center gap-4">
                <div class="h-px flex-1 bg-gradient-to-l from-purple-500/30 to-transparent"></div>
                <h2 class="text-xl font-black uppercase tracking-[0.2em] text-white">Relatório</h2>
                <div class="h-px flex-1 bg-gradient-to-r from-purple-500/30 to-transparent"></div>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <!-- Histórico -->
        <section class="glass-card rounded-3xl p-6 md:p-8 mt-12">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-bold text-white tracking-tight">Histórico</h3>
                <button onclick="clearHistory()" class="btn-gradient px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest text-white hover:brightness-110 transition-all">
                    LIMPAR
                </button>
            </div>
            <div id="historyList" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <script>
        let worldCount = 0;
        const TRANSFER_COST = 990;

        function parseTibiaGold(input) {
            if (!input) return 0;
            let val = input.toString().toLowerCase().trim().replace(/\./g, '').replace(/,/g, '.').replace(/\s/g, '');
            if (val.endsWith('kkk') || val.endsWith('b')) return parseFloat(val) * 1000000000;
            if (val.endsWith('kk') || val.endsWith('m')) return parseFloat(val) * 1000000;
            if (val.endsWith('k')) return parseFloat(val) * 1000;
            return parseFloat(val.replace(/[^\d.]/g, '')) || 0;
        }

        function formatBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        function updateCardHeader(id, value) {
            const header = document.getElementById(`header-title-${id}`);
            if (header) header.textContent = value.trim() !== "" ? value : `Servidor ${id}`;
        }

        function addWorld() {
            worldCount++;
            const card = document.createElement('div');
            card.className = 'glass-card rounded-3xl p-6 relative group animate-in slide-in-from-bottom-5 duration-300';
            card.id = `world-card-${worldCount}`;
            card.innerHTML = `
                <button onclick="removeWorld(${worldCount})" class="absolute top-6 right-6 text-slate-600 hover:text-red-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <div class="mb-6">
                    <h4 id="header-title-${worldCount}" class="text-xl font-black text-white truncate pr-10 italic">Servidor ${worldCount}</h4>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Nome do Mundo</label>
                        <input type="text" id="name-${worldCount}" placeholder="Ex: Antica" oninput="updateCardHeader(${worldCount}, this.value)" 
                               class="w-full p-4 rounded-xl input-dark text-lg font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-purple-400 uppercase tracking-widest mb-1.5 ml-1">PREÇO DO TC</label>
                        <input type="text" id="tcGold-${worldCount}" placeholder="Ex: 38.000" 
                               class="w-full p-4 rounded-xl input-dark text-lg font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-purple-400 uppercase tracking-widest mb-1.5 ml-1">Preço do Item</label>
                        <input type="text" id="itemGold-${worldCount}" placeholder="Ex: 120.000.000" 
                               class="w-full p-4 rounded-xl input-dark text-lg font-bold">
                    </div>
                    <label class="flex items-center gap-3 p-4 rounded-2xl bg-white/5 cursor-pointer hover:bg-white/10 border border-white/5 transition-all mt-2">
                        <input type="checkbox" id="transfer-${worldCount}" class="h-6 w-6 rounded bg-slate-800 border-slate-600 text-purple-600 focus:ring-purple-500">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-tight">INCLUIR 990 TC DA TRANSFER</span>
                    </label>
                </div>
            `;
            document.getElementById('worldsContainer').appendChild(card);
        }

        function removeWorld(id) { 
            document.getElementById(`world-card-${id}`)?.remove();
        }

        function resetSearch() {
            document.getElementById('globalItemName').value = "";
            document.getElementById('globalCoin25').value = "";
            document.getElementById('worldsContainer').innerHTML = "";
            worldCount = 0;
            document.getElementById('resultsWrapper').classList.add('hidden');
            addWorld(); addWorld();
        }

        function calculate() {
            const itemName = document.getElementById('globalItemName').value || "Item";
            const brlFor25Tc = parseTibiaGold(document.getElementById('globalCoin25').value);
            const worldCards = document.querySelectorAll('[id^="world-card-"]');
            
            if (brlFor25Tc <= 0) return;

            let data = [];
            worldCards.forEach(card => {
                const id = card.id.split('-').pop();
                const name = document.getElementById(`name-${id}`).value || `Servidor ${id}`;
                const tcPriceGold = parseTibiaGold(document.getElementById(`tcGold-${id}`).value);
                const itemPriceGold = parseTibiaGold(document.getElementById(`itemGold-${id}`).value);
                const includeTransfer = document.getElementById(`transfer-${id}`).checked;

                if (tcPriceGold > 0 && itemPriceGold > 0) {
                    const itemInCoins = itemPriceGold / tcPriceGold;
                    const transferCoins = includeTransfer ? TRANSFER_COST : 0;
                    const totalCoins = itemInCoins + transferCoins;
                    const coinUnitPrice = brlFor25Tc / 25;
                    const totalBrl = totalCoins * coinUnitPrice;
                    data.push({ name, itemInCoins, transferCoins, totalCoins, totalBrl });
                }
            });

            if (data.length === 0) return;
            data.sort((a, b) => a.totalBrl - b.totalBrl);
            renderResults(itemName, data);
            saveToHistory(itemName, data);
        }

        function renderResults(itemName, data) {
            const wrapper = document.getElementById('resultsWrapper');
            const grid = document.getElementById('resultsGrid');
            const cheapest = data[0].totalBrl;
            
            wrapper.classList.remove('hidden');
            grid.innerHTML = '';

            data.forEach((w, index) => {
                const diff = w.totalBrl - cheapest;
                const isBest = index === 0;
                const card = document.createElement('div');
                card.className = `glass-card rounded-3xl p-7 relative transition-all duration-500 ${isBest ? 'scale-105 z-10 border-purple-500/50 shadow-purple-900/40 shadow-2xl' : 'opacity-60'}`;

                let medal = index === 0 ? '<span class="text-4xl medal-1">🥇</span>' : 
                            index === 1 ? '<span class="text-4xl medal-2">🥈</span>' : 
                            index === 2 ? '<span class="text-4xl medal-3">🥉</span>' : "";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h5 class="text-purple-500 text-[10px] font-black uppercase mb-1">#${index + 1}</h5>
                            <h4 class="text-2xl font-black text-white truncate max-w-[150px] italic">${w.name}</h4>
                        </div>
                        ${medal}
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-xs">
                            <span class="text-slate-500 font-bold">ITEM</span>
                            <span class="font-mono text-slate-200">${Math.floor(w.itemInCoins)} TC</span>
                        </div>
                        <div class="flex justify-between text-xs">
                            <span class="text-slate-500 font-bold">TRANSFER</span>
                            <span class="font-mono ${w.transferCoins > 0 ? 'text-purple-400' : 'text-slate-600'}">${w.transferCoins} TC</span>
                        </div>
                        <div class="h-px bg-white/5 w-full"></div>
                        <div class="flex flex-col pt-2">
                            <span class="text-3xl font-black text-white">${formatBRL(w.totalBrl)}</span>
                            <span class="text-[11px] text-purple-400/60 font-mono italic">${Math.floor(w.totalCoins)} Coins</span>
                        </div>
                    </div>
                    ${isBest ? 
                        `<div class="bg-purple-600 text-white text-[10px] font-black py-3 rounded-xl text-center uppercase tracking-[0.3em]">MELHOR OPÇÃO</div>` : 
                        `<div class="bg-red-500/10 text-red-400 text-[10px] font-black py-3 rounded-xl text-center uppercase">+ ${formatBRL(diff)}</div>`
                    }
                `;
                grid.appendChild(card);
            });
            window.scrollTo({ top: wrapper.offsetTop - 50, behavior: 'smooth' });
        }

        function saveToHistory(itemName, results) {
            const history = JSON.parse(localStorage.getItem('frav_history') || '[]');
            history.unshift({ 
                id: Date.now(), 
                timestamp: new Date().toLocaleDateString('pt-BR', {hour: '2-digit', minute:'2-digit'}), 
                itemName, 
                bestWorld: results[0].name, 
                bestValue: results[0].totalBrl, 
                fullData: results 
            });
            localStorage.setItem('frav_history', JSON.stringify(history.slice(0, 10)));
            loadHistory();
        }

        function loadHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('frav_history') || '[]');
            if (history.length === 0) { historyList.innerHTML = '<p class="text-center text-slate-600 text-xs uppercase font-bold">Vazio</p>'; return; }
            historyList.innerHTML = history.map(item => `
                <div onclick="restoreHistory(${item.id})" class="flex items-center justify-between p-5 rounded-2xl bg-white/5 border border-white/5 hover:border-purple-500/20 transition-all cursor-pointer">
                    <div class="flex items-center gap-5">
                        <div class="bg-purple-900 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black">${item.itemName.charAt(0)}</div>
                        <div>
                            <div class="font-black text-white italic">${item.itemName}</div>
                            <div class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">${item.timestamp} • ${item.bestWorld}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-black text-purple-400">${formatBRL(item.bestValue)}</div>
                    </div>
                </div>
            `).join('');
        }

        function restoreHistory(id) {
            const history = JSON.parse(localStorage.getItem('frav_history') || '[]');
            const entry = history.find(h => h.id === id);
            if (entry) {
                document.getElementById('globalItemName').value = entry.itemName;
                renderResults(entry.itemName, entry.fullData);
            }
        }

        function clearHistory() {
            if(confirm("Limpar histórico?")) {
                localStorage.removeItem('frav_history'); loadHistory();
                document.getElementById('resultsWrapper').classList.add('hidden');
            }
        }

        window.onload = () => { addWorld(); addWorld(); loadHistory(); };
    </script>
</body>
</html>
