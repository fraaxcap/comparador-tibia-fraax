<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fravao Cap Comparativos</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:#eee;
    text-align:center;
}

/* ===== HEADER PREMIUM CINZA ===== */
.premium-header{
    background:linear-gradient(145deg,#1a1a1a,#2a2a2a);
    padding:25px 0;
    border-bottom:2px solid #666;
    box-shadow:0 0 20px rgba(200,200,200,0.2);
}

.logo-container{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:30px;
}

.logo-gif{
    width:90px;
    filter:drop-shadow(0 0 8px rgba(200,200,200,0.5));
}

.logo-gif.left{
    transform:scaleX(-1);
}

.title{
    font-size:32px;
    font-weight:bold;
    letter-spacing:2px;
    background:linear-gradient(90deg,#aaa,#fff,#aaa);
    background-size:200% auto;
    color:transparent;
    background-clip:text;
    -webkit-background-clip:text;
    animation:silverShine 5s linear infinite;
}

@keyframes silverShine{
    0%{background-position:0% center;}
    100%{background-position:200% center;}
}

/* ===== INPUTS ===== */
input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
    width:150px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#555;
    color:#fff;
}

button:hover{
    background:#777;
}

/* ===== RESULTADOS ===== */
.resultados{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    width:200px;
    box-shadow:0 0 15px rgba(255,255,255,0.1);
    position:relative;
}

.card h2{
    margin:0;
}

.item-nome{
    font-size:14px;
    color:#bbb;
    margin-bottom:10px;
}

.ranking{
    font-size:28px;
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
}

.vencedor{
    border:2px solid #aaa;
    box-shadow:0 0 20px rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<header class="premium-header">
    <div class="logo-container">
        <img src="Mage.gif" class="logo-gif left">
        <h1 class="title">Fravao Cap Comparativos</h1>
        <img src="Mage.gif" class="logo-gif">
    </div>
</header>

<br>

<input type="text" id="itemNome" placeholder="Nome do Item">
<br>
<input type="text" id="valorCoins" placeholder="Valor em Coins">
<input type="text" id="valorKK" placeholder="Valor em KK">
<br>
<button onclick="calcular()">Calcular</button>

<div class="resultados" id="resultados"></div>

<script>
function limparNumero(valor){
    if(!valor) return 0;
    valor = valor.replace(/\./g,'').replace(',','.');
    return parseFloat(valor);
}

function salvarDados(dados){
    localStorage.setItem("comparadorDados", JSON.stringify(dados));
}

function carregarDados(){
    const dados = localStorage.getItem("comparadorDados");
    if(dados){
        return JSON.parse(dados);
    }
    return null;
}

function calcular(){

    const item = document.getElementById("itemNome").value;
    const coins = limparNumero(document.getElementById("valorCoins").value);
    const kk = limparNumero(document.getElementById("valorKK").value);

    if(coins <= 0 || kk <= 0){
        alert("Preencha os valores corretamente.");
        return;
    }

    const valorPorKK = coins / kk;

    const mundos = [
        {nome:"Rubinot", preco:valorPorKK},
        {nome:"Gentebra", preco:valorPorKK * 1.05},
        {nome:"Belobra", preco:valorPorKK * 0.95}
    ];

    mundos.sort((a,b)=>a.preco - b.preco);

    const rankingIcon = ["🥇","🥈","🥉"];

    let html="";

    mundos.forEach((mundo,index)=>{

        html+=`
        <div class="card ${index==0?'vencedor':''}">
            <div class="ranking">${rankingIcon[index]}</div>
            <h2>${mundo.nome}</h2>
            <div class="item-nome">${item}</div>
            <p>${mundo.preco.toFixed(2)} coins por KK</p>
        </div>
        `;
    });

    document.getElementById("resultados").innerHTML = html;

    salvarDados({item,coins,kk});
}

window.onload = function(){
    const dados = carregarDados();
    if(dados){
        document.getElementById("itemNome").value = dados.item;
        document.getElementById("valorCoins").value = dados.coins;
        document.getElementById("valorKK").value = dados.kk;
    }
}
</script>

</body>
</html>
