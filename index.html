<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fravao Cap Comparativos</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
    color:#e5e5e5;
    margin:0;
    padding:0;
}

/* ===== HEADER ===== */

.premium-header {
    background: linear-gradient(145deg, #111, #1c1c1c);
    padding: 25px 0;
    border-bottom: 2px solid #555;
    box-shadow: 0 0 25px rgba(200,200,200,0.15);
}

.logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
}

.logo-gif {
    width: 90px;
    filter: drop-shadow(0 0 8px rgba(200,200,200,0.4));
}

.logo-gif.left { transform: scaleX(-1); }

.title {
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #888, #fff, #888);
    background-size: 200% auto;
    color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    animation: silverShine 4s linear infinite;
}

@keyframes silverShine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

/* ===== CONTEÚDO ===== */

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.globalItem, .world{
    background:#151515;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

.field{ margin-bottom:15px; }

label{
    display:block;
    font-size:14px;
    margin-bottom:5px;
    color:#aaa;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#0d0d0d;
    color:white;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-right:10px;
    background:#333;
    color:white;
}

button:hover{
    background:#555;
}

.removeBtn{
    background:#5a1a1a;
    margin-top:10px;
}

/* ===== RESULTADOS ===== */

.results{ margin-top:40px; }

.resultCard{
    background:#101010;
    padding:20px;
    border-radius:14px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.7);
    position:relative;
}

.best{
    border:2px solid #999;
    box-shadow:0 0 20px rgba(200,200,200,0.4);
}

.highlight{
    color:#fff;
    font-weight:bold;
}

.ranking{
    position:absolute;
    top:15px;
    right:20px;
    font-size:24px;
}

/* ===== HISTÓRICO ===== */

.history{
    margin-top:40px;
    background:#0f0f0f;
    padding:20px;
    border-radius:14px;
}

.historyItem{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.historyItem:hover{
    background:#1a1a1a;
}
</style>
</head>
<body>

<header class="premium-header">
    <div class="logo-container">
        <img src="Mage.gif" class="logo-gif left">
        <h1 class="title">Fravao Cap Comparativos</h1>
        <img src="Mage.gif" class="logo-gif">
    </div>
</header>

<div class="container">

<div class="globalItem">
    <div class="field">
        <label>Nome do Item (Identificação)</label>
        <input type="text" id="globalItemName">
    </div>
</div>

<div id="worlds"></div>

<button onclick="addWorld()">Adicionar Mundo</button>
<button onclick="calculate()">Calcular Comparativo</button>

<div id="results" class="results"></div>

<div class="history">
    <h3>Histórico de Consultas</h3>
    <div id="historyList"></div>
</div>

</div>

<script>

let worldCount = 0;

function parseGold(value){
    if(!value) return 0;
    return parseFloat(value.replace(/[^\d]/g, ""));
}

function parseMoney(value){
    if(!value) return 0;

    value = value.trim();

    if(value.includes(",") && !value.includes(".")){
        value = value.replace(",", ".");
    }

    if(value.includes(".") && value.includes(",")){
        value = value.replace(/\./g, "").replace(",", ".");
    }

    return parseFloat(value);
}

function addWorld(){
    worldCount++;

    const div = document.createElement("div");
    div.className="world";
    div.id="world"+worldCount;

    div.innerHTML=`
        <h3>Mundo ${worldCount}</h3>

        <div class="field">
            <label>Nome do Mundo</label>
            <input type="text" id="name${worldCount}">
        </div>

        <div class="field">
            <label>Preço da Coin (em gold)</label>
            <input type="text" id="tcGold${worldCount}">
        </div>

        <div class="field">
            <label>Valor do Item (em GOLD)</label>
            <input type="text" id="itemGold${worldCount}">
        </div>

        <div class="field">
            <label>Valor de 25 Coins (R$)</label>
            <input type="text" id="coin25${worldCount}">
        </div>

        <div>
            <input type="checkbox" id="transfer${worldCount}">
            <label for="transfer${worldCount}">Incluir Transfer (990 Coins)</label>
        </div>

        <button class="removeBtn" onclick="removeWorld(${worldCount})">Remover</button>
    `;

    document.getElementById("worlds").appendChild(div);
}

function removeWorld(id){
    document.getElementById("world"+id)?.remove();
}

function saveHistory(data){
    const history = JSON.parse(localStorage.getItem("history")) || [];
    history.unshift(data);
    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();
}

function loadHistory(){
    const history = JSON.parse(localStorage.getItem("history")) || [];
    let html="";

    history.forEach((entry,index)=>{
        html+=`
        <div class="historyItem" onclick='showHistory(${index})'>
            <strong>${entry.itemName}</strong><br>
            Mais barato: ${entry.cheapestName} - R$ ${entry.cheapestValue.toFixed(2)}
        </div>
        `;
    });

    document.getElementById("historyList").innerHTML = html;
}

function showHistory(index){
    const history = JSON.parse(localStorage.getItem("history")) || [];
    const entry = history[index];
    document.getElementById("results").innerHTML = entry.fullHTML;
}

function calculate(){

    let worldsData = [];
    const worlds = document.querySelectorAll(".world");
    const itemName = document.getElementById("globalItemName").value || "Item sem nome";

    worlds.forEach(world=>{

        const id = world.id.replace("world","");

        const name = document.getElementById(`name${id}`).value;
        const tcGold = parseGold(document.getElementById(`tcGold${id}`).value);
        const itemGold = parseGold(document.getElementById(`itemGold${id}`).value);
        const coin25 = parseMoney(document.getElementById(`coin25${id}`).value);
        const includeTransfer = document.getElementById(`transfer${id}`).checked;

        if(!name || !tcGold || !itemGold || !coin25) return;

        const itemCoins = itemGold / tcGold;
        const coinUnit = coin25 / 25;
        const transferCoins = includeTransfer ? 990 : 0;

        const totalCoins = itemCoins + transferCoins;
        const totalReais = totalCoins * coinUnit;

        worldsData.push({
            name,
            itemCoins,
            transferCoins,
            totalCoins,
            totalReais
        });
    });

    if(worldsData.length === 0) return;

    worldsData.sort((a,b)=>a.totalReais - b.totalReais);
    const cheapest = worldsData[0];

    const medals = ["🥇","🥈","🥉"];

    let html=`<h2>Item: ${itemName}</h2>`;

    worldsData.forEach((world,index)=>{

        const diff = world.totalReais - cheapest.totalReais;

        html+=`
        <div class="resultCard ${world.name===cheapest.name ? "best" : ""}">
            ${medals[index] ? `<div class="ranking">${medals[index]}</div>` : ""}

            <h3>${world.name}</h3>

            Item em Coins: ${world.itemCoins.toFixed(0)}<br>
            Transfer em Coins: ${world.transferCoins}<br><br>

            <span class="highlight">
            Total Coins: ${world.totalCoins.toFixed(0)}
            </span><br>

            <span class="highlight">
            Total em R$: ${world.totalReais.toFixed(2)}
            </span><br><br>

            ${world.name!==cheapest.name ? 
            `Diferença para o mais barato: R$ ${diff.toFixed(2)}` 
            : `<span class="highlight">🔥 MAIS VANTAJOSO</span>`}
        </div>
        `;
    });

    document.getElementById("results").innerHTML=html;

    saveHistory({
        itemName,
        cheapestName: cheapest.name,
        cheapestValue: cheapest.totalReais,
        fullHTML: html
    });
}

addWorld();
loadHistory();

</script>

</body>
</html>
