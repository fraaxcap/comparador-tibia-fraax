<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fravao Cap Comparativos</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.world{
    background:#1f2937;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.field{
    margin-bottom:15px;
}

label{
    display:block;
    font-size:14px;
    margin-bottom:5px;
    color:#94a3b8;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#111827;
    color:white;
}

.checkbox{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-right:10px;
}

.addBtn{ background:#22c55e; }
.calcBtn{ background:#3b82f6; }
.removeBtn{ background:#ef4444; margin-top:10px; }

.results{
    margin-top:40px;
}

.resultCard{
    background:#111827;
    padding:20px;
    border-radius:14px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.best{
    border:2px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.5);
}

.highlight{
    color:#22c55e;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Fravao Cap Comparativos</h1>

<div class="container">

<div id="worlds"></div>

<button class="addBtn" onclick="addWorld()">Adicionar Mundo</button>
<button class="calcBtn" onclick="calculate()">Calcular Comparativo</button>

<div id="results" class="results"></div>

</div>

<script>

let worldCount = 0;

/* =========================
   FUNÇÃO INTELIGENTE
   ========================= */
function parseNumber(value){
    if(!value) return 0;

    value = value.toString().trim();

    if(value.includes(",") && value.includes(".")){
        if(value.lastIndexOf(",") > value.lastIndexOf(".")){
            value = value.replace(/\./g, "").replace(",", ".");
        } else {
            value = value.replace(/,/g, "");
        }
    }
    else if(value.includes(",")){
        value = value.replace(",", ".");
    }

    return parseFloat(value);
}

/* ========================= */

function addWorld(){
    worldCount++;

    const div = document.createElement("div");
    div.className="world";
    div.id="world"+worldCount;

    div.innerHTML=`
        <h3>Mundo ${worldCount}</h3>

        <div class="field">
            <label>Nome do Mundo</label>
            <input type="text" id="name${worldCount}" placeholder="Ex: Vesperia">
        </div>

        <div class="field">
            <label>Preço da Coin (em gold)</label>
            <input type="text" id="tcGold${worldCount}" placeholder="Ex: 59.450 ou 59450">
        </div>

        <div class="field">
            <label>Valor do Item (em GOLD)</label>
            <input type="text" id="itemGold${worldCount}" placeholder="Ex: 500.000.000 ou 500000000">
        </div>

        <div class="field">
            <label>Valor de 25 Coins (R$)</label>
            <input type="text" id="coin25${worldCount}" placeholder="Ex: 2.35 ou 2,35">
        </div>

        <div class="checkbox">
            <input type="checkbox" id="transfer${worldCount}">
            <label for="transfer${worldCount}">Incluir Transfer (990 Coins)</label>
        </div>

        <button class="removeBtn" onclick="removeWorld(${worldCount})">Remover</button>
    `;

    document.getElementById("worlds").appendChild(div);
}

function removeWorld(id){
    document.getElementById("world"+id)?.remove();
}

function calculate(){

    let worldsData = [];
    const worlds = document.querySelectorAll(".world");

    worlds.forEach(world=>{

        const id = world.id.replace("world","");

        const name = document.getElementById(`name${id}`).value;
        const tcGold = parseNumber(document.getElementById(`tcGold${id}`).value);
        const itemGold = parseNumber(document.getElementById(`itemGold${id}`).value);
        const coin25 = parseNumber(document.getElementById(`coin25${id}`).value);
        const includeTransfer = document.getElementById(`transfer${id}`).checked;

        if(!name || !tcGold || !itemGold || !coin25) return;

        const itemCoins = itemGold / tcGold;
        const coinUnit = coin25 / 25;

        const transferCoins = includeTransfer ? 990 : 0;

        const totalCoins = itemCoins + transferCoins;
        const totalReais = totalCoins * coinUnit;

        worldsData.push({
            name,
            itemCoins,
            transferCoins,
            totalCoins,
            totalReais
        });
    });

    if(worldsData.length === 0) return;

    worldsData.sort((a,b)=>a.totalReais - b.totalReais);

    const cheapest = worldsData[0];

    let html="";

    worldsData.forEach(world=>{

        const diff = world.totalReais - cheapest.totalReais;

        html+=`
        <div class="resultCard ${world.name===cheapest.name ? "best" : ""}">
            <h3>${world.name}</h3>

            Item em Coins: ${world.itemCoins.toFixed(0)}<br>
            Transfer em Coins: ${world.transferCoins}<br><br>

            <span class="highlight">
            Total Coins: ${world.totalCoins.toFixed(0)}
            </span><br>

            <span class="highlight">
            Total em R$: ${world.totalReais.toFixed(2)}
            </span><br><br>

            ${world.name!==cheapest.name ? 
            `Diferença para o mais barato: R$ ${diff.toFixed(2)}` 
            : `<span class="highlight">🔥 MAIS VANTAJOSO</span>`}
        </div>
        `;
    });

    document.getElementById("results").innerHTML=html;
}

addWorld();

</script>

</body>
</html>
