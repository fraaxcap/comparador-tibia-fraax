<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fravao Cap - Comparativo Cross-World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Martel:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea;
            --bg-dark: #0a0a0c;
            --spectral-bolt: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% -20%, #2e1a4d 0%, #0a0a0c 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(17, 17, 23, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(168, 85, 247, 0.15);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7);
        }

        .silver-text {
            font-family: 'Martel', serif;
            background: linear-gradient(to right, #94a3b8, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
            white-space: nowrap; 
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding-bottom: 5px;
            font-style: normal; 
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .arrow-container {
            position: absolute;
            width: 42px; 
            height: 16px;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            top: 68px; 
            animation: bolt-loop 3.5s infinite linear; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes bolt-loop {
            0% { left: -12%; opacity: 0; transform: scaleX(1); }
            2% { opacity: 1; }
            48% { left: 112%; opacity: 1; transform: scaleX(1); }
            49% { opacity: 0; transform: scaleX(1); }
            50% { left: 112%; opacity: 0; transform: scaleX(-1); }
            52% { opacity: 1; }
            98% { left: -18%; opacity: 1; transform: scaleX(-1); }
            100% { opacity: 0; left: -12%; transform: scaleX(-1); }
        }

        .input-dark {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.1);
            color: white;
            transition: all 0.3s;
        }

        .input-dark:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.15);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #9333ea 0%, #6b21a8 100%);
        }

        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-16 text-center relative overflow-visible">
        <div class="flex items-center justify-center gap-2 md:gap-14 mb-2 px-2 overflow-visible relative">
            <div class="relative shrink-0 z-20">
                <img src="https://raw.githubusercontent.com/fraaxcap/comparador-tibia-fraax/5e186fbf7e5fab55fedc614a8dbb7b49ff312cfe/Mage.gif" class="w-16 h-16 md:w-28 md:h-28 mirror opacity-90 drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
            </div>

            <div class="flex flex-col items-center justify-center overflow-visible pt-2 relative flex-1">
                <h1 class="text-3xl sm:text-5xl md:text-7xl font-black tracking-tighter silver-text px-2 z-10 relative">
                    FRAVAO CAP
                </h1>
                <div class="absolute inset-0 pointer-events-none overflow-visible hidden sm:block">
                    <div class="arrow-container">
                        <svg width="42" height="16" viewBox="0 0 100 20" fill="none">
                            <path d="M15 10H85" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                            <path d="M5 3L20 10L5 17" stroke="#a855f7" stroke-width="2.5" stroke-linejoin="round"/>
                            <path d="M78 3L97 10L78 17Z" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>
                            <path d="M25 10H70" stroke="white" stroke-width="1" opacity="0.9" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                <p class="font-serif text-slate-400 tracking-[0.3em] uppercase text-[10px] md:text-xs opacity-80 mt-1 z-10 relative">
                    Comparativo de Itens Cross-World
                </p>
            </div>

            <div class="relative shrink-0 z-20">
                <img src="https://raw.githubusercontent.com/fraaxcap/comparador-tibia-fraax/5e186fbf7e5fab55fedc614a8dbb7b49ff312cfe/Mage.gif" class="w-16 h-16 md:w-28 md:h-28 opacity-90 drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto space-y-8">
        <!-- Seção Principal de Formulário -->
        <section class="glass-card rounded-3xl p-6 md:p-8 border-t border-purple-500/30">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-6 items-end">
                <div class="lg:col-span-4">
                    <label class="block text-[10px] font-black text-purple-400 uppercase mb-2.5 tracking-widest">Item</label>
                    <input type="text" id="globalItemName" placeholder="Ex: Soulbleeder..." class="w-full p-4 rounded-2xl input-dark text-lg font-bold">
                </div>
                <div class="lg:col-span-3">
                    <label class="block text-[10px] font-black text-purple-400 uppercase mb-2.5 tracking-widest">25 Coins (R$)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">R$</span>
                        <input type="text" id="globalCoin25" placeholder="5,50" class="w-full p-4 pl-12 rounded-2xl input-dark text-lg font-bold">
                    </div>
                </div>
                <div class="lg:col-span-5 flex flex-wrap gap-3">
                    <button type="button" onclick="addWorld()" class="btn-gradient flex-1 min-w-[120px] px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider text-white hover:brightness-110 transition-all">
                        + Servidor
                    </button>
                    <button type="button" onclick="calculate()" class="bg-white text-slate-950 flex-1 min-w-[120px] px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider hover:bg-slate-100 transition-all">
                        Calcular
                    </button>
                    <button type="button" onclick="resetInputs()" class="bg-slate-800/50 text-slate-400 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-wider border border-white/5 hover:bg-slate-800 transition-all">
                        Reset
                    </button>
                </div>
            </div>
        </section>

        <div id="worldsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="resultsWrapper" class="hidden space-y-6 pt-10">
            <h2 class="text-center text-xl font-black uppercase tracking-[0.2em] text-white">Relatório de Melhores Preços</h2>
            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <section class="glass-card rounded-3xl p-6 md:p-8 mt-12">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-bold text-white tracking-tight">Histórico de Pesquisas</h3>
                <div class="flex gap-2">
                    <button type="button" id="btnClearHistory" onclick="clearHistory()" class="btn-gradient px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest text-white hover:scale-105 active:scale-95 transition-all">
                        LIMPAR TUDO
                    </button>
                </div>
            </div>
            <div id="historyList" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <script>
        let worldCount = 0;
        const TRANSFER_COST = 990;
        const STORAGE_KEY = 'frav_history_v3';

        function parseTibiaValue(input) {
            if (!input) return 0;
            let clean = input.toString().toLowerCase().trim().replace(/\s/g, '');
            let multiplier = 1;
            if (clean.includes('kkk') || clean.includes('b')) {
                multiplier = 1000000000;
            } else if (clean.includes('kk') || clean.includes('m')) {
                multiplier = 1000000;
            } else if (clean.includes('k')) {
                multiplier = 1000;
            }
            let numericPart = clean.replace(/[^\d.,]/g, '').replace(',', '.');
            if ((numericPart.match(/\./g) || []).length > 1) {
                const parts = numericPart.split('.');
                const last = parts.pop();
                numericPart = parts.join('') + '.' + last;
            }
            let value = parseFloat(numericPart);
            return isNaN(value) ? 0 : value * multiplier;
        }

        function formatBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        function addWorld() {
            worldCount++;
            const card = document.createElement('div');
            card.className = 'glass-card world-card rounded-3xl p-6 relative animate-in slide-in-from-bottom-5 duration-300';
            card.dataset.id = worldCount;
            card.id = `card-${worldCount}`;
            card.innerHTML = `
                <button type="button" onclick="document.getElementById('card-${worldCount}').remove()" class="absolute top-6 right-6 text-slate-600 hover:text-red-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[9px] font-black text-purple-400 uppercase mb-1 ml-1 tracking-widest">Nome do Mundo</label>
                        <input type="text" class="world-name w-full p-4 rounded-xl input-dark text-lg font-bold" placeholder="Ex: Vesperia">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-purple-400 uppercase mb-1 ml-1 tracking-widest">Preço do TC (Gold)</label>
                        <input type="text" class="tc-gold w-full p-4 rounded-xl input-dark text-lg font-bold" placeholder="Ex: 38.000">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-purple-400 uppercase mb-1 ml-1 tracking-widest">Preço do Item (Gold)</label>
                        <input type="text" class="item-gold w-full p-4 rounded-xl input-dark text-lg font-bold" placeholder="Ex: 120kk">
                    </div>
                    <label class="flex items-center gap-3 p-4 rounded-2xl bg-white/5 cursor-pointer hover:bg-white/10 transition-colors">
                        <input type="checkbox" class="transfer-check h-5 w-5 rounded bg-slate-800 border-slate-600 text-purple-600">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-tight">Incluir Transfer (990 TC)</span>
                    </label>
                </div>
            `;
            document.getElementById('worldsContainer').appendChild(card);
        }

        function calculate() {
            const itemName = document.getElementById('globalItemName').value || "Item";
            const brlFor25TcInput = document.getElementById('globalCoin25').value;
            const brlFor25Tc = parseTibiaValue(brlFor25TcInput);
            
            if (brlFor25Tc <= 0) {
                alert("Por favor, introduz o valor de 25 Tibia Coins em R$.");
                return;
            }

            const worldCards = document.querySelectorAll('.world-card');
            let results = [];

            worldCards.forEach(card => {
                const nameInput = card.querySelector('.world-name');
                const name = nameInput.value || "Servidor";
                const tcGold = parseTibiaValue(card.querySelector('.tc-gold').value);
                const itemGold = parseTibiaValue(card.querySelector('.item-gold').value);
                const hasTransfer = card.querySelector('.transfer-check').checked;

                if (tcGold > 0 && itemGold > 0) {
                    const itemCoins = itemGold / tcGold;
                    const transferCoins = hasTransfer ? TRANSFER_COST : 0;
                    const totalCoins = itemCoins + transferCoins;
                    const unitPrice = brlFor25Tc / 25;
                    const totalBrl = totalCoins * unitPrice;

                    results.push({ name, itemCoins, transferCoins, totalCoins, totalBrl });
                }
            });

            if (results.length === 0) {
                alert("Preencha corretamente os valores de TC e Item nos cards dos servidores.");
                return;
            }

            results.sort((a, b) => a.totalBrl - b.totalBrl);
            renderResults(itemName, results);
            saveHistory(itemName, results);
        }

        function renderResults(itemName, data) {
            const wrapper = document.getElementById('resultsWrapper');
            const grid = document.getElementById('resultsGrid');
            
            if (!data || data.length === 0) return;
            
            const bestPrice = data[0].totalBrl;
            
            wrapper.classList.remove('hidden');
            grid.innerHTML = '';

            data.forEach((w, index) => {
                const isBest = index === 0;
                const card = document.createElement('div');
                card.className = `glass-card rounded-3xl p-7 transition-all duration-500 ${isBest ? 'border-purple-500 scale-105 shadow-2xl z-10' : 'opacity-70 scale-95'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <h4 class="text-xl font-black text-white italic truncate pr-2">${w.name}</h4>
                        <span class="text-2xl">${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : ''}</span>
                    </div>
                    <div class="space-y-3 mb-6">
                        <div class="flex justify-between text-xs"><span class="text-slate-500 font-bold uppercase">Item</span><span class="text-white font-mono">${Math.floor(w.itemCoins)} TC</span></div>
                        <div class="flex justify-between text-xs"><span class="text-slate-500 font-bold uppercase">Transfer</span><span class="${w.transferCoins > 0 ? 'text-purple-400' : 'text-slate-600'} font-mono">${w.transferCoins} TC</span></div>
                        <div class="pt-3 border-t border-white/5">
                            <div class="text-3xl font-black text-white">${formatBRL(w.totalBrl)}</div>
                            <div class="text-[10px] text-purple-400 font-mono font-bold">${Math.floor(w.totalCoins)} TOTAL COINS</div>
                        </div>
                    </div>
                    ${isBest ? 
                        '<div class="bg-purple-600 text-white text-[10px] font-black py-2.5 rounded-xl text-center tracking-[0.2em]">MELHOR OPÇÃO</div>' : 
                        `<div class="bg-red-500/10 text-red-400 text-[10px] font-black py-2.5 rounded-xl text-center uppercase">+ ${formatBRL(w.totalBrl - bestPrice)}</div>`
                    }
                `;
                grid.appendChild(card);
            });

            setTimeout(() => {
                window.scrollTo({ top: wrapper.offsetTop - 40, behavior: 'smooth' });
            }, 100);
        }

        function saveHistory(itemName, results) {
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch(e) { history = []; }
            
            const newItem = {
                id: Date.now(),
                time: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                itemName,
                bestWorld: results[0].name,
                bestValue: results[0].totalBrl,
                fullData: results
            };
            history.unshift(newItem);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 10)));
            loadHistory();
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch(e) { history = []; }
            
            if (history.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-600 py-6 text-[10px] font-bold tracking-widest uppercase">Nenhum histórico disponível</p>';
                return;
            }

            list.innerHTML = '';
            history.forEach(h => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-purple-500/30 transition-all group relative animate-in fade-in duration-300";
                
                itemDiv.innerHTML = `
                    <div class="flex flex-col cursor-pointer flex-1 history-click-area">
                        <span class="font-black text-white italic group-hover:text-purple-400 transition-colors">${h.itemName}</span>
                        <span class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">${h.time} • Melhor: ${h.bestWorld}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <div class="font-black text-purple-400 text-sm">${formatBRL(h.bestValue)}</div>
                        </div>
                        <button type="button" class="delete-history-btn text-slate-600 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-white/5">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                             </svg>
                        </button>
                    </div>
                `;
                
                itemDiv.querySelector('.history-click-area').onclick = () => renderResults(h.itemName, h.fullData);
                itemDiv.querySelector('.delete-history-btn').onclick = (e) => {
                    e.stopPropagation();
                    deleteHistoryItem(h.id);
                };
                
                list.appendChild(itemDiv);
            });
        }

        function deleteHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            history = history.filter(item => item.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            loadHistory();
        }

        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            const list = document.getElementById('historyList');
            if(list) list.innerHTML = '';
            loadHistory();
        }

        function resetInputs() {
            document.getElementById('globalItemName').value = "";
            document.getElementById('globalCoin25').value = "";
            document.getElementById('worldsContainer').innerHTML = "";
            document.getElementById('resultsWrapper').classList.add('hidden');
            
            worldCount = 0;
            addWorld();
            addWorld();
            
            document.getElementById('globalItemName').focus();
        }

        window.onload = () => {
            loadHistory();
            const container = document.getElementById('worldsContainer');
            if(container && container.children.length === 0) {
                addWorld();
                addWorld();
            }
        };
    </script>
</body>
</html>
