<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador Tibia - Fraax</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0d0d0d;
    color:#e5e5e5;
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(90deg,#111,#1a1a1a,#111);
    letter-spacing:2px;
    border-bottom:1px solid #333;
}

/* FORM */
.container{
    padding:20px;
    max-width:1600px;
    margin:auto;
}

input{
    padding:10px;
    margin:5px;
    background:#1a1a1a;
    border:1px solid #333;
    color:#fff;
    border-radius:6px;
}

button{
    padding:10px 15px;
    margin:5px;
    background:#2c2c2c;
    border:1px solid #444;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#3a3a3a;
}

/* RESULTADOS */
.results{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-top:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:12px;
    padding:20px;
    text-align:center;
    position:relative;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
    border:1px solid #555;
}

.card img{
    width:80px;
    margin-bottom:10px;
}

.rank{
    position:absolute;
    top:10px;
    right:10px;
    font-size:20px;
}

/* HISTÓRICO */
.history{
    margin-top:40px;
    padding:20px;
    background:#141414;
    border-top:1px solid #333;
}

.historyItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #333;
}

.historyItem:hover{
    background:#222;
}

.deleteHistoryBtn{
    background:#5a1a1a;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.deleteHistoryBtn:hover{
    background:#7a2222;
}
</style>
</head>

<body>

<header>
Comparador Tibia - Fraax
</header>

<div class="container">

<input type="text" id="itemName" placeholder="Nome do Item">
<input type="text" id="worldName" placeholder="Nome do Mundo">
<input type="number" id="coinValue" placeholder="Valor em Coin">
<input type="number" id="kkValue" placeholder="Valor em KK">
<button onclick="addWorld()">Adicionar Mundo</button>
<button onclick="calculate()">Calcular Ranking</button>

<div class="results" id="results"></div>

<div class="history">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3>Histórico de Consultas</h3>
        <button onclick="clearHistory()">Limpar Histórico</button>
    </div>
    <div id="historyList"></div>
</div>

</div>

<script>

let worlds = [];

function addWorld(){
    const worldName = document.getElementById("worldName").value;
    const coinValue = parseFloat(document.getElementById("coinValue").value);
    const kkValue = parseFloat(document.getElementById("kkValue").value);

    if(!worldName || !coinValue || !kkValue){
        alert("Preencha todos os campos do mundo.");
        return;
    }

    worlds.push({
        worldName,
        coinValue,
        kkValue,
        total: coinValue * kkValue
    });

    document.getElementById("worldName").value="";
    document.getElementById("coinValue").value="";
    document.getElementById("kkValue").value="";
}

function calculate(){

    const itemName = document.getElementById("itemName").value;
    if(!itemName){
        alert("Digite o nome do item.");
        return;
    }

    if(worlds.length < 1){
        alert("Adicione pelo menos 1 mundo.");
        return;
    }

    worlds.sort((a,b)=>a.total-b.total);

    let html="";
    worlds.forEach((w,index)=>{

        let medal="";
        if(index===0) medal="🥇";
        if(index===1) medal="🥈";
        if(index===2) medal="🥉";

        html+=`
        <div class="card">
            <div class="rank">${medal}</div>
            <img src="https://raw.githubusercontent.com/fraaxcap/comparador-tibia-fraax/main/Mage.gif">
            <h2>${w.worldName}</h2>
            <p><strong>${itemName}</strong></p>
            <p>Coin: ${w.coinValue}</p>
            <p>KK: ${w.kkValue}</p>
            <h3>R$ ${w.total.toFixed(2)}</h3>
        </div>
        `;
    });

    document.getElementById("results").innerHTML=html;

    saveHistory(itemName, worlds);

    worlds=[];
}

function saveHistory(itemName, worldsData){

    const history = JSON.parse(localStorage.getItem("history")) || [];

    history.unshift({
        itemName,
        worlds: worldsData
    });

    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();
}

function loadHistory(){

    const history = JSON.parse(localStorage.getItem("history")) || [];
    let html="";

    history.forEach((entry,index)=>{

        html+=`
        <div class="historyItem">
            <div onclick='showHistory(${index})' style="cursor:pointer;">
                <strong>${entry.itemName}</strong>
            </div>
            <button class="deleteHistoryBtn" onclick="deleteHistory(${index})">Excluir</button>
        </div>
        `;
    });

    document.getElementById("historyList").innerHTML=html;
}

function showHistory(index){

    const history = JSON.parse(localStorage.getItem("history")) || [];
    const entry = history[index];

    worlds = entry.worlds;
    document.getElementById("itemName").value = entry.itemName;
    calculate();
}

function deleteHistory(index){
    const history = JSON.parse(localStorage.getItem("history")) || [];
    history.splice(index,1);
    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();
}

function clearHistory(){
    localStorage.removeItem("history");
    loadHistory();
    document.getElementById("results").innerHTML="";
}

loadHistory();

</script>

</body>
</html>
